# Hyprland commands
# Dispatchers
# https://wiki.hypr.land/0.46.0/Configuring/Dispatchers/
# Keywords
# https://wiki.hypr.land/Configuring/Keywords/
# Variables
# https://wiki.hypr.land/Configuring/Variables/

# Unbind omarchy defaults
unbind = SUPER CTRL, L
unbind = SUPER, J
unbind = SUPER, K
unbind = CTRL ALT, J
unbind = CTRL ALT, H
unbind = SUPER SHIFT, C
unbind = SUPER SHIFT, X
unbind = CTRL SHIFT, Q

$browser = uwsm app -- chromium --new-window --ozone-platform=wayland
# $browser = chromium
# $browser = qutebrowser

# System
bind = SUPER SHIFT CTRL, 0, exec, hyprlock
bindl = , switch:Lid Switch, exec, ~/.config/hypr/scripts/lid-close.sh

# Application bindings
bindd = SUPER, RETURN, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)"

# F key bindings
bindd = , F1, Terminal, exec, omarchy-launch-or-focus "com.mitchellh.ghostty" "uwsm-app -- xdg-terminal-exec --dir=\"$(omarchy-cmd-terminal-cwd)\""
bindd = , F2, Kiro, exec, omarchy-launch-or-focus kiro
bindd = , F3, Qutebrowser, exec, omarchy-launch-or-focus qutebrowser
bindd = , F4, Qutebrowser, exec, omarchy-launch-or-focus code
bindd = , F8, File Manager, exec, omarchy-launch-or-focus aether
bindd = , F9, File Manager, exec, omarchy-launch-or-focus "org.gnome.Nautilus" "uwsm-app -- nautilus --new-window"
bindd = , F12, Kiro Run, exec, ~/.config/hypr/scripts/kiro-run.sh
bindd = , F10, Chromium, exec, omarchy-launch-or-focus chromium

# App shortcuts
bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER SHIFT, B, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT ALT, B, Browser (private), exec, omarchy-launch-browser --private
bindd = SUPER SHIFT, M, Music, exec, omarchy-launch-or-focus spotify
bindd = SUPER SHIFT, N, Editor, exec, omarchy-launch-editor
bindd = SUPER SHIFT, D, Docker, exec, omarchy-launch-tui lazydocker
bindd = SUPER SHIFT, G, Signal, exec, omarchy-launch-or-focus ^signal$ "uwsm-app -- signal-desktop"
bindd = SUPER SHIFT, O, Obsidian, exec, omarchy-launch-or-focus ^obsidian$ "uwsm-app -- obsidian -disable-gpu --enable-wayland-ime"
bindd = SUPER SHIFT, W, Typora, exec, uwsm-app -- typora --enable-wayland-ime
bindd = SUPER SHIFT, SLASH, Passwords, exec, uwsm-app -- 1password

# If your web app url contains #, type it as ## to prevent hyprland treating it as a comment
bindd = SUPER SHIFT, A, ChatGPT, exec, omarchy-launch-webapp "https://chatgpt.com"
bindd = SUPER SHIFT ALT, A, Grok, exec, omarchy-launch-webapp "https://grok.com"
bindd = SUPER SHIFT, C, Calendar, exec, omarchy-launch-webapp "https://app.hey.com/calendar/weeks/"
bindd = SUPER SHIFT, E, Email, exec, omarchy-launch-webapp "https://app.hey.com"
bindd = SUPER SHIFT, Y, YouTube, exec, omarchy-launch-webapp "https://youtube.com/"
bindd = SUPER SHIFT ALT, G, WhatsApp, exec, omarchy-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/"
bindd = SUPER SHIFT CTRL, G, Google Messages, exec, omarchy-launch-or-focus-webapp "Google Messages" "https://messages.google.com/web/conversations"
bindd = SUPER SHIFT, P, Google Photos, exec, omarchy-launch-or-focus-webapp "Google Photos" "https://photos.google.com/"
bindd = SUPER SHIFT, X, X, exec, omarchy-launch-webapp "https://x.com/"
bindd = SUPER SHIFT ALT, X, X Post, exec, omarchy-launch-webapp "https://x.com/compose/post"

# Resize apps
bind = SUPER ALT, h, resizeactive, -20 0
bind = SUPER ALT, l, resizeactive, 20 0
bind = SUPER ALT, k, resizeactive, 0 -20
bind = SUPER ALT, j, resizeactive, 0 20
bind = SUPER CTRL, y, exec, hyprctl dispatch resizeactive exact 60% 60% ; hyprctl dispatch centerwindow

bind = SUPER CTRL SHIFT, n, resizeactive, -240 0
bind = SUPER CTRL SHIFT, l, resizeactive, 240 0
bind = SUPER CTRL SHIFT, k, resizeactive, 0 -160
bind = SUPER CTRL SHIFT, j, resizeactive, 0 160

# Layout ratio presets
# bindd = SUPER CTRL, 0, Resize 1/3 width R, exec, ~/.config/hypr/scripts/resize-ratio.sh 0.33 r
# bindd = SUPER CTRL, 9, Resize 1/4 width R, exec, ~/.config/hypr/scripts/resize-ratio.sh 0.25 r
# bindd = SUPER CTRL, 8, Resize 1/4 width L, exec, ~/.config/hypr/scripts/resize-ratio.sh 0.25 l
# bindd = SUPER CTRL, 7, Resize 1/3 width L, exec, ~/.config/hypr/scripts/resize-ratio.sh 0.33 l

# Reload Hyprland configuration
bind = SUPER SHIFT, R, exec, hyprctl reload

# Rebind keys
bindd = SUPER SHIFT, J, Toggle window split, togglesplit, # dwindle
bindd = SUPER SHIFT, K, Show key bindings, exec, omarchy-menu-keybindings

# Movement
bindd = SUPER, H, Move window focus left, movefocus, l
bindd = SUPER, L, Move window focus right, movefocus, r
bindd = SUPER, K, Move window focus up, movefocus, u
bindd = SUPER, J, Move window focus down, movefocus, d

bindd = SUPER CTRL, H, Move window focus left, swapwindow, l
bindd = SUPER CTRL, L, Move window focus right, swapwindow, r
bindd = SUPER CTRL, K, Move window focus up, swapwindow, u
bindd = SUPER CTRL, J, Move window focus down, swapwindow, d

# Toggle split orientation
bind = SUPER CTRL ALT, H, togglesplit
bind = SUPER CTRL ALT, V, togglesplit

# Change split ratio
bind = SUPER CTRL, 0, exec, hyprctl dispatch splitratio exact 1
bind = SUPER ALT CTRL, 9, exec, hyprctl dispatch splitratio exact 1.56
bind = SUPER CTRL, 9, exec, hyprctl dispatch splitratio exact 1.33
bind = SUPER CTRL, 8, exec, hyprctl dispatch splitratio exact 1.25
bind = SUPER CTRL, 7, exec, hyprctl dispatch splitratio exact 0.75
bind = SUPER CTRL, 6, exec, hyprctl dispatch splitratio exact 0.66


bind = SUPER SHIFT CTRL, 0, exec, xdg-settings set default-web-browser qutebrowser.desktop
bind = SUPER SHIFT CTRL, 9, exec, xdg-settings set default-web-browser chromium.desktop

bind = SUPER SHIFT, L, exec, ~/.config/hypr/scripts/workspace-switch.sh next
bind = SUPER SHIFT, H, exec, ~/.config/hypr/scripts/workspace-switch.sh prev

bind = SUPER SHIFT, RIGHT, exec, ~/.config/hypr/scripts/workspace-switch.sh next
bind = SUPER SHIFT, LEFT, exec, ~/.config/hypr/scripts/workspace-switch.sh prev

# Navigate montiors
bindd = SUPER SHIFT CTRL, H, Move window monitor left, movewindow, mon:l
bindd = SUPER SHIFT CTRL, L, Move window monitor right, movewindow, mon:r

bindd = SUPER SHIFT ALT CTRL, H, Move window monitor left, movecurrentworkspacetomonitor, l
bindd = SUPER SHIFT ALT CTRL, L, Move window monitor right, movecurrentworkspacetomonitor, r

bind = SUPER SHIFT CTRL, 1, movetoworkspacesilent, 1
bind = SUPER SHIFT CTRL, 2, movetoworkspacesilent, 2
bind = SUPER SHIFT CTRL, 3, movetoworkspacesilent, 3
bind = SUPER SHIFT CTRL, 4, movetoworkspacesilent, 4
bind = SUPER SHIFT CTRL, 5, movetoworkspacesilent, 5


# Center window
bind = SUPER SHIFT, C, exec, centerwindow

# bind = SUPER SHIFT, L, workspace, r+1
# bind = SUPER SHIFT, H, workspace, r-1

