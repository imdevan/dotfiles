# Change the default Omarchy look'n'feel

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    # No gaps between windows or borders


    gaps_in = 0
    gaps_out = 0
    # border_size = 0
    # border_size = 1
 
    # gaps_in = 2
    # gaps_out = 4
    # border_size = 1

    gaps_in = 16
    gaps_out = 32

    # gaps_out = 64
    # gaps_out = 96
    # gaps_out = 124

    # border_size = 0
    border_size = 2
  
    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    # No ansi support for overrides, unfortunately
    # col.active_border = rgba(52CFFFFF)    # baby blue
    # col.active_border = rgba(94C7C8FF)    # lighter blue
    col.active_border = rgba(FEC4FFFF)    # light pink
    # col.active_border = rgba(E2C264FF)    # yellow
    # col.active_border = rgba(4aeb85FF)    # green
    col.inactive_border = rgba(FFFFFF22)    # clear
    # col.active_border = rgba(FFFFFF22)    # clear
    # col.inactive_border = rgba(000000aa)    # clear
  

    # gaps_in = 4
    # gaps_out = 24
    # border_size = 1

    # gaps_in = 8
    # gaps_out = 64
    # border_size = 2

    # Use master layout instead of dwindle
    # layout = master
}

xwayland {
  force_zero_scaling = true
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    # Use round window corners
    # rounding = 0
    rounding = 14
    # rounding = 8
    # rounding = 4
    rounding_power = 4.0

    blur {
        enabled = true
        # passes = 3
        size = 8
        # Changes the color of the blurred area
        vibrancy = 0.5
        # vibrancy_darkness	= 0.5
        brightness = 1.2
        # Optional: Use xray to make windows look behind other windows
        # xray = true
    }

}

# https://wiki.hypr.land/Configuring/Dwindle-Layout/
dwindle {
    # Avoid overly wide single-window layouts on wide screens
    # single_window_aspect_ratio = 1.6 1
}



