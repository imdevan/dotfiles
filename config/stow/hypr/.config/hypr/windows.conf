
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# Hyprland 0.53+ syntax
windowrule = suppress_event maximize, match:class .*

# Just dash of opacity by default
# windowrule = opacity 0.97 0.7, match:class .*
windowrule = opacity 1, match:class .*
windowrule = opacity 0.94 0.7, match:class .*
# windowrule = opacity 0.9 0.6, match:class .*
# windowrule = opacity 0.7 0.4, match:class .*
# windowrule = opacity 0.8 0.5, match:class .*
# windowrule = opacity 0.84 0.48, match:class .*
# windowrule = opacity 0.84 0.7, match:class .*

# windowrule = opacity 0.9 0.8, match:class org.qutebrowser.qutebrowser
# windowrule = opacity 1 1, match:class org.qutebrowser.qutebrowser
# windowrule = opacity 1 1, match:class chromium

# windowrule = opacity 0.9 0.8, match:class com.mitchellh.ghostty
# windowrule = opacity 1 0.8, match:class com.mitchellh.ghostty
# windowrule = opacity 1 0.8 match:class li.oever.aether # keep aether fully opacke for theming clarity
# windowrule = opacity 0.8 0.5, no_blur on, match:class com.mitchellh.ghostty
# windowrule = opacity 0.84 0.5, match:class kitty
# windowrule = opacity 0.97 0.7, match:class .*
# windowrule = opacity 0.97 0.9, match:class .*

# Fix some dragging issues with XWayland
windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0

# App-specific tweaks
source = ~/.local/share/omarchy/default/hypr/apps.conf


