# See https://wiki.hyprland.org/Configuring/Monitors/
# List current monitors and resolutions possible: hyprctl monitors
# Format: monitor = [port], resolution, position, scale
# Monitor eDP-1 (ID 0):
# 	availableModes: 1920x1080@60.01Hz 1920x1080@48.01Hz 
# Monitor HDMI-A-1 (ID 1):
# 	availableModes: 1920x1080@60.00Hz 1920x1080@74.99Hz 1920x1080@60.00Hz 1920x1080@59.94Hz 1920x1080@50.00Hz 1680x1050@59.88Hz 1600x900@60.00Hz 1280x1024@75.03Hz 1280x1024@60.02Hz 1440x900@59.90Hz 1280x960@60.00Hz 1366x768@59.79Hz 1152x864@75.00Hz 1280x768@59.87Hz 1280x720@60.00Hz 1280x720@60.00Hz 1280x720@59.94Hz 1280x720@50.00Hz 1024x768@75.03Hz 1024x768@60.00Hz 800x600@75.00Hz 800x600@60.32Hz 720x576@50.00Hz 720x576@50.00Hz 720x480@60.00Hz 720x480@60.00Hz 720x480@59.94Hz 720x480@59.94Hz 640x480@75.00Hz 640x480@60.00Hz 640x480@59.94Hz 640x480@59.94Hz 720x400@70.08Hz 


# Optimized for retina-class 2x displays, like 13" 2.8K, 27" 5K, 32" 6K.
env = GDK_SCALE,2
monitor=,preferred,auto,auto

monitor = eDP-1, 1920x1080@60.01, 0x0, 1.67
# monitor = eDP-1, 1920x1080@60.01, 0x0, 1.2

# monitor = eDP-1, 1920x1080@60.01, 0x0, 1.5
# monitor = HDMI-A-1, 1920x1080@74.99, auto, 1

# Good compromise for 27" or 32" 4K monitors (but fractional!)
# env = GDK_SCALE,1.75ctrl:swap_lctl_lshift
# monitor=,preferrctrl:swap_lctl_lshifted,auto,1.6

# Straight 1x setup for low-resolution displays like 1080p or 1440p
# env = GDK_SCALE,1
# monitor=,preferred,auto,1

# Example for Framework 13 w/ 6K XDR Apple display
# monitor = DP-5, 6016x3384ctrl:swap_lctl_lshift@60, auto, 2
# monitor = eDP-1, 2880x1920@120, auto, 2
