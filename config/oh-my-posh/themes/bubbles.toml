console_title_template = '{{.PWD}}'
version = 3
final_space = true

[palette]
base = '#eff1f5'
blue = '#8AADF4'
green = '#a6da95'
lavender = '#B7BDF8'
maroon = '#e64553'
mauve = '#8839ef'
orange = '#fe640b'
os = '#ACB0BE'
pink = '#F5BDE6'
red = '#e64553'
rosewater = '#dc8a78'
peach = '#f5a97f'
sky = '#04a5e5'
teal = '#40c4ff'
text = '#494D64'
violet = '#8839ef'
wight = '#FFFFFF'
yellow = '#e6c35c'

[upgrade]
source = 'cdn'
interval = '168h'
auto = false
notice = false

[[blocks]]
type = 'prompt'
alignment = 'left'
newline = true
force = true

[[blocks.segments]]
template = ' '
type = 'text'
style = 'plain'

[[blocks]]
type = 'prompt'
alignment = 'left'

# User
# [[blocks.segments]]
# leading_diamond = ''
# trailing_diamond = ' '
# template = '{{ .UserName }}'
# foreground = 'p:text'
# background = 'p:blue'
# type = 'session'
# style = 'diamond'

# [var]
#   LocationVar = '{{ if eq .Path .Home }}~{{ else if .Parent }}{{ .Parent }}/{{ .Folder }}{{ else }}{{ .Folder }}{{ end }}'

[[blocks.segments]]
leading_diamond = ''
trailing_diamond = ''
# template = ' {{ if ge (len .PathSegments) 2 }}{{ index .PathSegments (sub (len .PathSegments) 2) }}/{{ index .PathSegments (sub (len .PathSegments) 1) }}{{ else }}{{ .Folder }}{{ end }}'
# template = ' {{ if eq .Path .Home }}~{{ else if .Parent }}{{ .Parent }}/{{ .Folder }}{{ else }}{{ .Folder }}{{ end }}'  
# template = ' {{ .PWD }}'
template = ' {{ .Folder }}'
foreground = 'p:text'
background = 'p:pink'
type = 'path'
style = 'diamond'

[blocks.segments.properties]
style = 'folder'

[[blocks.segments]]
leading_diamond = ' '
trailing_diamond = ''
template = '{{ .HEAD }}'
foreground = 'p:text'
background = 'p:lavender'
type = 'git'
style = 'diamond'

[blocks.segments.properties]
branch_icon = ' '
cherry_pick_icon = ' '
commit_icon = ' '
fetch_status = false
fetch_upstream_icon = false
merge_icon = ' '
no_commits_icon = ' '
rebase_icon = ' '
revert_icon = ' '
tag_icon = ' '

[[blocks.segments]]
leading_diamond = ' '
trailing_diamond = ''
template = '{{ if .Error }}{{ .Error }}{{ else }}{{ if .Venv }}{{ .Venv }} {{ end }}{{ .Full }}{{ end }}'
foreground = '#E4F34A'
background = '#29315A'
type = 'python'
style = 'diamond'

[blocks.segments.properties]
fetch_version = false

[[blocks.segments]]
leading_diamond = ' '
trailing_diamond = ''
template = '{{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}'
foreground = '#7FD5EA'
background = '#29315A'
type = 'go'
style = 'diamond'

[blocks.segments.properties]
fetch_version = false

[[blocks.segments]]
leading_diamond = ' '
trailing_diamond = ''
template = '{{ if .PackageManagerIcon }}{{ .PackageManagerIcon }} {{ end }}{{ .Full }}'
foreground = '#42E66C'
background = '#29315A'
type = 'node'
style = 'diamond'

[blocks.segments.properties]
fetch_version = false

[[blocks.segments]]
leading_diamond = ' '
trailing_diamond = ''
template = '{{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}'
foreground = '#E64747'
background = '#29315A'
type = 'ruby'
style = 'diamond'

[blocks.segments.properties]
fetch_version = false

[[blocks.segments]]
leading_diamond = ' '
trailing_diamond = ''
template = '{{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}'
foreground = '#E64747'
background = '#29315A'
type = 'java'
style = 'diamond'

[blocks.segments.properties]
fetch_version = false

[[blocks.segments]]
leading_diamond = ' '
trailing_diamond = ''
template = '{{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }} '
foreground = '#9B6BDF'
background = '#29315A'
type = 'julia'
style = 'diamond'

[blocks.segments.properties]
fetch_version = false

