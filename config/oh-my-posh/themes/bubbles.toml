[[blocks]]
type = 'prompt'
alignment = 'left'
newline = true
force = true

[[blocks.segments]]
template = ' '
type = 'text'
style = 'plain'

[[blocks]]
type = 'prompt'
alignment = 'left'
newline = true

[[blocks.segments]]
leading_diamond = ''
trailing_diamond = ' '
template = '{{ .FormattedMs }}'
foreground = '#AEA4BF'
background = '#29315A'
type = 'executiontime'
style = 'diamond'

[blocks.segments.properties]
style = 'austin'
threshold = 150

